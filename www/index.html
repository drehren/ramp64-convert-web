<!DOCTYPE html>
<html>

<head>
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RaMp64 SRM Converter</title>
</head>

<body>
  <script type="module">
    import init, {convert} from './pkg/ramp64_convert_web.js';
    import {get_checked, get_hidden, set_hidden} from './utils.js'

    async function run() {
      await init(); // this loads the wasm module

      // install handlers
      function show_mode(is_create) {
        set_hidden("create_div", !is_create);
        set_hidden("split_div", is_create);
        set_hidden("convert", false);
        document.getElementById("error_info").innerHTML = null
      }

      document.getElementById("create_btn").addEventListener("click", (_) => show_mode(true));
      document.getElementById("split_btn").addEventListener("click", (_) => show_mode(false));
      document.getElementById("is_mupen").addEventListener("change", function () {
        set_hidden("mupen_pak", !this.checked);
        set_hidden("player_paks", this.checked);
      });
      document.getElementById("convert_btn").addEventListener("click", async (_) => {
        const is_create = !get_hidden("create_div");
        const is_split = !get_hidden("split_div");
        // ugh .. hate this
        let result = undefined;
        try {
          result = await convert(is_create, is_split);
        } catch (error) {
          let result = {
            error: "Unexpected error: " + error
          };
        }
        document.getElementById("error_info").innerHTML = result.error ?? null;
      });

      function set_split_accept(ext) {
        document.getElementById("container_file").accept = ext 
      }

      document.getElementById("retroarch_container").addEventListener("change", function () { set_split_accept(".srm") });
      document.getElementById("bizhawk_container").addEventListener("change", function () { set_split_accept(".SaveRAM") });
    }

    run()
  </script>

  <h1>RaMp64 Srm Convert</h1>
  <p>Start by clicking one of the buttons bellow.</p>
  <button id="create_btn">Create a SRM</button>
  <button id="split_btn">Split a SRM</button>

  <div id="create_div" hidden="true">
    <p>Select a battery save and/or a controller pak file to create a container.</p>
    Save Container:
    <div>
      <input id="retroarch_fmt" type="checkbox" checked>
      <label for="retroarch_fmt">RetroArch (.SRM)</label>
    </div>
    <div>
      <input id="bizhawk_fmt" type="checkbox">
      <label for="bizhawk_fmt">BizHawk (.SaveRAM)</label>
    </div>
    <br />
    <div>
      <label for="battery_file">Battery File:</label>
      <input id="battery_file" type="file" accept=".eep, .fla, .sra">
    </div>
    <div id="paks">
      <div>
        <input type="checkbox" id="is_mupen">
        <label for="is_mupen">Read single file Controller Pak (from Mupen)</label>
      </div>
      <div id="mupen_pak" hidden="true">
        <label for="controller_pak_mp">Controller Pak</label>
        <input id="controller_pak_mp" type="file" accept=".mpk">
      </div>
      <div id="player_paks">
        <div>
          <label for="controller_pak_1">Controller Pak 1</label>
          <input id="controller_pak_1" type="file" accept=".mpk, .mpk1">
        </div>
        <div>
          <label for="controller_pak_2">Controller Pak 2</label>
          <input id="controller_pak_2" type="file" accept=".mpk, .mpk2">
        </div>
        <div>
          <label for="controller_pak_3">Controller Pak 3</label>
          <input id="controller_pak_3" type="file" accept=".mpk, .mpk3">
        </div>
        <div>
          <label for="controller_pak_4">Controller Pak 4</label>
          <input id="controller_pak_4" type="file" accept=".mpk, .mpk4">
        </div>
      </div>
    </div>
  </div>

  <div id="split_div" hidden="true">
    <p>Select a container file to split.</p>
    Save Container:
    <div>
      <input id="retroarch_container" type="radio" name="container" value="RetroArch" checked>
      <label for="retroarch_container">RetroArch (.SRM)</label>
    </div>
    <div>
      <input id="bizhawk_container" type="radio" name="container" value="BizHawk">
      <label for="bizhawk_container">BizHawk (.SaveRAM)</label>
    </div>
    <br />
    <div>
      <label for="container_file">Contaniner file:</label>
      <input id="container_file" type="file" accept=".srm">
    </div>
    <div>
      <input id="mupen_out" type="checkbox">
      <label for="mupen_out">Create single file Controller Pak (for Mupen)</label>
    </div>
  </div>

  <div id="convert" hidden="true">
    <br />
    <b>Additional options</b>
    <div>
      <input id="swap_bytes" name="swap_bytes" type="checkbox">
      <label for="swap_bytes">Swap EEPROM/FlashRam save bytes</label>
    </div>
    <div>
      <br />
      <button id="convert_btn">Convert</button>
      <label id="error_info"></label>
    </div>
  </div>

  <div>
    <h3>The converted files will appear here</h3>
    <ul id="download_zone"></ul>
  </div>

</body>

</html>
